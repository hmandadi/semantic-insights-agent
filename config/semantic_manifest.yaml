# Semantic Manifest for Enterprise Sales Analytics
# ------------------------------------------------
# This manifest defines the semantic layer for the analytics platform.
# It includes tables, metrics, and dimensions with business-friendly names
# and descriptions, as well as relationships between them.

domain: Enterprise Sales Analytics

tables:
  fact_sales:
    description: >-
      Fact table containing transactional sales data. Each row represents a
      single sales event linking to customer, product, and region dimensions.
    primary_key: sale_id
    columns:
      sale_id:
        type: integer
        description: Unique identifier for the sale transaction.
      customer_id:
        type: integer
        description: Foreign key to dim_customer.
      product_id:
        type: integer
        description: Foreign key to dim_product.
      region_id:
        type: integer
        description: Foreign key to dim_region.
      revenue:
        type: decimal
        description: Revenue generated by the sale (in USD).
      quantity:
        type: integer
        description: Quantity of product sold.
    relationships:
      - dim_customer: customer_id -> dim_customer.customer_id
      - dim_product: product_id -> dim_product.product_id
      - dim_region: region_id -> dim_region.region_id

  dim_customer:
    description: Dimension table containing customer master data.
    primary_key: customer_id
    columns:
      customer_id:
        type: integer
        description: Unique identifier for a customer.
      customer_name:
        type: string
        description: Human‑readable name of the customer.
      customer_segment:
        type: string
        description: Business segment the customer belongs to.

  dim_product:
    description: Dimension table with product master information.
    primary_key: product_id
    columns:
      product_id:
        type: integer
        description: Unique identifier for a product.
      product_name:
        type: string
        description: Name of the product.
      product_category:
        type: string
        description: Category to which the product belongs.

  dim_region:
    description: Dimension table describing geographic regions.
    primary_key: region_id
    columns:
      region_id:
        type: integer
        description: Unique identifier for a region.
      region_name:
        type: string
        description: Human‑readable name of the region.
      country:
        type: string
        description: Country of the region.

metrics:
  revenue:
    description: Total revenue generated from sales.
    expression: SUM(fact_sales.revenue)
    type: monetary
    business_name: Revenue
  quantity:
    description: Total quantity of products sold.
    expression: SUM(fact_sales.quantity)
    type: integer
    business_name: Quantity Sold

dimensions:
  customer:
    description: Customer dimension for slicing and dicing sales data.
    table: dim_customer
    column: customer_name
    business_name: Customer
  product:
    description: Product dimension for analysis.
    table: dim_product
    column: product_name
    business_name: Product
  region:
    description: Geographic region dimension.
    table: dim_region
    column: region_name
    business_name: Region

relationships:

  fact_sales:
    customer:
      join_table: dim_customer
      join_key: customer_id

    product:
      join_table: dim_product
      join_key: product_id

    region:
      join_table: dim_region
      join_key: region_id

# End of semantic_manifest.yaml